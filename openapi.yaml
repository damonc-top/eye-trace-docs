# Eye Trace API — OpenAPI 3.1 契约(全量)
#
# 这是 client ↔ server 的**唯一契约真相源**。
# 任何一方都不要手写请求/响应类型 ——
# client 跑 `openapi-typescript` 生成 `src/api/schema.gen.ts`,
# server 跑 `oapi-codegen` 生成 `internal/api/api.gen.go`。
#
# 本文件由 `eye-trace-docs/openapi-skeleton.md` 的骨架约定补全而来;
# 修改契约先改 skeleton.md,再同步到本 yaml。

openapi: 3.1.0
info:
  title: Eye Trace API
  version: 0.1.0
  description: |
    EyeTraceAI client↔server 契约。常规操作走 REST + JSON,
    生图进度/结果走 SSE,文件走 multipart。
servers:
  - url: /api/v1

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string }

  schemas:
    # ── 共享枚举(与 eye-trace-config/shared/enums.yaml 同源)──────────────
    JobStatus:
      type: string
      enum: [pending, running, succeeded, failed, cancelled]

    MediaType:
      type: string
      enum: [image, video]

    ErrorCode:
      type: string
      enum:
        - VALIDATION_FAILED
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - QUOTA_EXCEEDED
        - WORKER_UNAVAILABLE
        - GENERATION_FAILED
        - CANCELLED
        - RATE_LIMITED
        - INTERNAL

    # ── 统一错误信封(所有 4xx/5xx)────────────────────────────────────────
    Problem:
      type: object
      required: [type, title]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code: { $ref: '#/components/schemas/ErrorCode' }
        requestId: { type: string }

    # ── 生图任务 ─────────────────────────────────────────────────────────
    CreateRunRequest:
      type: object
      required: [modelId, params]
      properties:
        modelId: { type: string }
        params:
          type: object
          additionalProperties: true
        inputAssetIds:
          type: array
          items: { type: string }

    WorkflowRun:
      type: object
      required: [jobId, status, createdAt]
      properties:
        jobId:        { type: string, format: uuid }
        status:       { $ref: '#/components/schemas/JobStatus' }
        modelId:      { type: string }
        progress:     { type: number, minimum: 0, maximum: 1 }
        resultUrl:    { type: string, nullable: true }
        thumbnailUrl: { type: string, nullable: true }
        error:        { type: string, nullable: true }
        createdAt:    { type: string, format: date-time }
        finishedAt:   { type: string, format: date-time, nullable: true }

    # ── 首页内容(/content/home)───────────────────────────────────────────
    # 三块 banner 并排,从左到右由 bannerSlots 数组顺序决定。
    # UI 容器最多 3 块;每个 slot 独立类型,后端通过 kind 派发。
    HomeContent:
      type: object
      required: [version, bannerSlots, vipPromo, recommend, modelItems, typeTabs, subTabs]
      properties:
        version:
          type: string
          description: 语义版本;任一字段更新 +1
        bannerSlots:
          type: array
          minItems: 1
          maxItems: 6
          items: { $ref: '#/components/schemas/BannerSlot' }
        vipPromo:       { $ref: '#/components/schemas/VipPromo' }
        recommend:      { $ref: '#/components/schemas/Recommend' }
        modelItems:     { $ref: '#/components/schemas/ModelItemsFeatured' }
        typeTabs:       { $ref: '#/components/schemas/TypeTabs' }
        subTabs:        { $ref: '#/components/schemas/SubTabs' }

    # 通用跳转目标:仅内部路由(viewId + params)。
    # 外部链接由客户端包成 webview viewId,不暴露外链字段。
    RouteTarget:
      type: object
      required: [viewId]
      properties:
        viewId: { type: string, description: 客户端路由 viewId,如 "model-detail" }
        params:
          type: object
          additionalProperties: true
          description: "路由参数,如 { id: \"1\" }"

    # ── BannerSlot:三种变体的判别联合 ────────────────────────────────────
    BannerSlot:
      oneOf:
        - $ref: '#/components/schemas/BannerSlotCarousel'
        - $ref: '#/components/schemas/BannerSlotStatic'
        - $ref: '#/components/schemas/BannerSlotStaticActions'
      discriminator:
        propertyName: kind
        mapping:
          carousel:      '#/components/schemas/BannerSlotCarousel'
          static:        '#/components/schemas/BannerSlotStatic'
          staticActions: '#/components/schemas/BannerSlotStaticActions'

    # 类型 1:多图轮播(占左 ~36.42% 宽)
    BannerSlotCarousel:
      type: object
      required: [kind, slides]
      properties:
        kind: { type: string, enum: [carousel] }
        intervalMs:
          type: integer
          default: 5000
          minimum: 1000
          description: 自动切换间隔(ms)
        slides:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/CarouselSlide' }

    CarouselSlide:
      type: object
      required: [imageUrl, target]
      properties:
        imageUrl: { type: string, format: uri }
        alt: { type: string }
        target: { $ref: '#/components/schemas/RouteTarget' }

    # 类型 2:单图(static,占 flex-1)
    BannerSlotStatic:
      type: object
      required: [kind, banner]
      properties:
        kind: { type: string, enum: [static] }
        banner: { $ref: '#/components/schemas/SingleBanner' }

    # 类型 3:单图 + 底部按钮条(占 flex-1)
    BannerSlotStaticActions:
      type: object
      required: [kind, banner, actions]
      properties:
        kind: { type: string, enum: [staticActions] }
        banner: { $ref: '#/components/schemas/SingleBanner' }
        actions:
          type: array
          minItems: 1
          maxItems: 8
          description: 底部按钮图标条;UI 类 gap-0.5 + min-w-0,过多会换行
          items: { $ref: '#/components/schemas/ActionButton' }

    SingleBanner:
      type: object
      required: [imageUrl, target]
      properties:
        imageUrl: { type: string, format: uri }
        alt: { type: string }
        target: { $ref: '#/components/schemas/RouteTarget' }

    ActionButton:
      type: object
      required: [label, target]
      properties:
        label:
          type: string
          maxLength: 8
          description: 按钮文字;a11y 必填,UI 配合 iconUrl 渲染为图标条
        iconUrl:
          type: string
          format: uri
          description: 按钮图标;可省略,省略时只显示 label
        target: { $ref: '#/components/schemas/RouteTarget' }

    # ── /content/home 其他块(沿用 liblib 形态)───────────────────────────
    VipPromo:
      type: object
      nullable: true
      required: [power, badge, prefix, suffix, badgeBgUrl]
      properties:
        power: { type: integer }
        badge: { type: string }
        prefix: { type: string }
        suffix: { type: string }
        badgeBgUrl: { type: string, format: uri }

    Recommend:
      type: object
      required: [cardWidth, perCharDelay, charFadeMs, holdMs]
      properties:
        announcement: { $ref: '#/components/schemas/RecommendAnnouncement' }
        models:
          type: array
          items: { $ref: '#/components/schemas/RecommendModelCard' }
        cardWidth:     { type: integer, default: 248 }
        perCharDelay:  { type: number,  default: 0.04 }
        charFadeMs:    { type: integer, default: 600 }
        holdMs:        { type: integer, default: 1000 }

    RecommendAnnouncement:
      type: object
      required: [text]
      properties:
        text: { type: string }
        viewId: { type: string }
        params:
          type: object
          additionalProperties: true
        externalHref: { type: string, format: uri }

    RecommendModelCard:
      type: object
      required: [title, desc, bgColor, accentColor]
      properties:
        title: { type: string }
        desc: { type: string }
        bgColor:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: CSS hex 颜色,6 位 hex 配 # 前缀
        accentColor:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: CSS hex 颜色,SVG corner accent fill
        icon:
          type: string
          format: uri
          description: 模型 logo 图标(MinIO URL,经 server 拼装)
        badge:
          type: string
          maxLength: 8
          description: 卡片右上角徽章(NEW / HOT / 独家 ...),省略则不渲染
        viewId: { type: string }
        params:
          type: object
          additionalProperties: true
        externalHref: { type: string, format: uri }

    ModelItemsFeatured:
      type: object
      required: [gap]
      properties:
        gap:   { type: integer, default: 5 }
        items:
          type: array
          items: { $ref: '#/components/schemas/ModelItemCard' }

    ModelItemCard:
      type: object
      required: [modelId, title]
      properties:
        modelId: { type: string }
        title: { type: string }
        cover: { type: string }

    TypeTabs:
      type: object
      properties:
        tabs:
          type: array
          items: { $ref: '#/components/schemas/TypeTab' }

    TypeTab:
      type: object
      required: [id, label]
      properties:
        id: { type: string }
        label: { type: string }

    SubTabs:
      type: object
      properties:
        tabs:
          type: array
          items: { $ref: '#/components/schemas/SubTab' }

    SubTab:
      type: object
      required: [id, label]
      properties:
        id: { type: string }
        label: { type: string }

    # ── 模型目录 ─────────────────────────────────────────────────────────
    ModelSummary:
      type: object
      required: [modelId, title, mediaType, cover]
      properties:
        modelId:   { type: string }
        title:     { type: string }
        author:    { type: string }
        cover:     { type: string, format: uri }
        typeTag:   { type: string }
        mediaType: { $ref: '#/components/schemas/MediaType' }

    ModelList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ModelSummary' }
        nextCursor: { type: string, nullable: true }

paths:
  # ── /content/home ─────────────────────────────────────────────────────
  /content/home:
    get:
      summary: 首页运营内容 + 首页精选模型
      description: |
        返回首页 5 个数据块。`modelItems.items` 不直接存卡片 JSON,
        而是存 `{ids: [...]}`,server 端按 id 联查派生 `ModelItemCard`。
        支持 ETag/SWR:`If-None-Match` 命中即返 304。
      parameters:
        - in: header
          name: If-None-Match
          required: false
          schema: { type: string }
          description: 上次响应 ETag(带/不带 W/ 前缀均可)
      responses:
        '200':
          description: 命中
          headers:
            ETag:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HomeContent' }
        '304':
          description: ETag 命中
        '500':
          description: 服务异常
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ── /models ───────────────────────────────────────────────────────────
  /models:
    get:
      summary: 模型目录(无限滚动)
      description: 游标分页;`sort` 一期只支持 `latest`。
      parameters:
        - in: query
          name: type
          schema: { $ref: '#/components/schemas/MediaType' }
        - in: query
          name: baseModel
          schema: { type: string }
        - in: query
          name: tag
          schema:
            type: array
            items: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: cursor
          schema: { type: string }
          description: 不透明游标(上次响应 nextCursor 透传)
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: sort
          schema:
            type: string
            enum: [latest]
      responses:
        '200':
          description: 命中
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelList' }
        '400':
          description: 参数非法
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /models/{modelId}:
    get:
      summary: 模型详情
      parameters:
        - in: path
          name: modelId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 命中
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelSummary' }
        '404':
          description: 模型不存在
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ── /workflow-runs ────────────────────────────────────────────────────
  /workflow-runs:
    post:
      summary: 提交生图
      description: 写操作支持 `Idempotency-Key` header。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRunRequest' }
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowRun' }
        '400':
          description: 参数非法
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /workflow-runs/{jobId}:
    get:
      summary: 查询 job 状态
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 命中
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowRun' }
    delete:
      summary: 取消 job
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: 已取消

  /workflow-runs/{jobId}/events:
    get:
      summary: job 事件 SSE 流
      description: |
        `text/event-stream`。
        事件:queued / progress / succeeded / failed。
        终态事件发送后 server 主动关闭流。
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Last-Event-ID
          required: false
          schema: { type: string }
          description: 断线重连时透传,server 重放未发事件
      responses:
        '200':
          description: SSE 流
          content:
            text/event-stream:
              schema: { type: string }
